availableSecrets:
  secretManager:
  - versionName: projects/942335066163/secrets/SLACK_WEBHOOK_URL/versions/latest
    env: SLACK_WEBHOOK_URL

steps:

# Step 1 — Run Semgrep Scan
- name: returntocorp/semgrep
  id: semgrep-scan
  entrypoint: sh
  args:
    - -c
    - |
      semgrep scan /workspace \
        --config=p/security-audit \
        --config=p/python \
        --config=p/flask \
        --config=p/sql-injection \
        --config=custom-rules/ \
        --json \
        --output=semgrep-results.json

# Step 1.5 — Convert JSON Report to HTML
- name: ubuntu
  id: generate-html-report
  entrypoint: bash
  args:
    - -c
    - |
      apt update && apt install -y jq

      echo "<html><head>
      <title>Semgrep Security Report</title>
      <style>
      body {font-family: Arial; margin:40px;}
      table {border-collapse: collapse; width:100%;}
      th,td {border:1px solid #ccc; padding:8px;}
      th {background:#f4f4f4;}
      .ERROR {color:red; font-weight:bold;}
      .WARNING {color:orange;}
      </style>
      </head><body>" > semgrep-report.html

      echo "<h2>Semgrep Security Scan Report</h2>" >> semgrep-report.html
      echo "<h3>Repository: $REPO_NAME</h3>" >> semgrep-report.html
      echo "<h3>Commit: $COMMIT_SHA</h3>" >> semgrep-report.html
      echo "<h3>Branch: $BRANCH_NAME</h3>" >> semgrep-report.html
      echo "<h3>Build ID: $BUILD_ID</h3>" >> semgrep-report.html
      echo "<table>" >> semgrep-report.html
      echo "<tr><th>Severity</th><th>Rule</th><th>File</th><th>Line</th><th>Description</th></tr>" >> semgrep-report.html

      jq -r '.results[] |
      "<tr>
      <td class=\"\(.extra.severity)\">\(.extra.severity)</td>
      <td>\(.check_id)</td>
      <td>\(.path)</td>
      <td>\(.start.line)</td>
      <td>\(.extra.message)</td>
      </tr>"' semgrep-results.json >> semgrep-report.html

      echo "</table></body></html>" >> semgrep-report.html


# Step 2 — Upload Report to GCS
- name: gcr.io/google.com/cloudsdktool/cloud-sdk
  id: upload-report
  entrypoint: bash
  args:
    - -c
    - |
      gsutil cp semgrep-results.json gs://semgrep-security-scan-reports/$BUILD_ID-semgrep.json
      gsutil cp semgrep-report.html gs://semgrep-security-scan-reports/$BUILD_ID-semgrep.html


# Step 3 — Count Vulnerabilities
- name: ubuntu
  id: check-vulnerabilities
  entrypoint: bash
  args:
    - -c
    - |
      apt update && apt install -y jq

      HIGH_COUNT=$$(jq '[.results[]? | select(.extra.severity == "ERROR")] | length' semgrep-results.json)

      echo "High severity findings: $$HIGH_COUNT"

      echo $$HIGH_COUNT > vuln-count.txt


# Step 4 — Send Slack Alert
- name: curlimages/curl
  id: slack-alert
  entrypoint: sh
  secretEnv:
    - SLACK_WEBHOOK_URL
  args:
    - -c
    - |
      HIGH_COUNT=$$(cat vuln-count.txt)

      MESSAGE="Semgrep Scan Result | Repo: $REPO_NAME | Commit: $COMMIT_SHA | High Issues: $$HIGH_COUNT | Report: https://storage.cloud.google.com/semgrep-security-scan-reports/$BUILD_ID-semgrep.html"

      curl -X POST -H "Content-type: application/json" \
      --data "{\"text\":\"$$MESSAGE\"}" \
      $$SLACK_WEBHOOK_URL


# Step 5 — Block Build If Needed
- name: ubuntu
  id: block-build
  entrypoint: bash
  args:
    - -c
    - |
      HIGH_COUNT=$$(cat vuln-count.txt)

      if [ "$$HIGH_COUNT" -gt 0 ]; then
        echo "Blocking build due to vulnerabilities"
        exit 1
      fi


# Step 6 — Build Docker Image
- name: gcr.io/cloud-builders/docker
  args:
    - build
    - "-t"
    - "us-central1-docker.pkg.dev/gabeo-poc/security-pipeline-poc/app"
    - "."


images:
- "us-central1-docker.pkg.dev/gabeo-poc/security-pipeline-poc/app"

options:
  logging: CLOUD_LOGGING_ONLY