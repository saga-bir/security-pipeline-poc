availableSecrets:
  secretManager:
  - versionName: projects/942335066163/secrets/SLACK_WEBHOOK_URL/versions/latest
    env: SLACK_WEBHOOK_URL

steps:

# Step 1 — Run Semgrep Scan
- name: returntocorp/semgrep
  id: semgrep-scan
  entrypoint: sh
  args:
    - -c
    - |
      semgrep scan /workspace \
        --config=p/security-audit \
        --config=p/python \
        --config=p/flask \
        --config=p/sql-injection \
        --config=custom-rules/ \
        --json \
        --output=semgrep-results.json


# Step 2 — Upload Report to GCS
- name: gcr.io/google.com/cloudsdktool/cloud-sdk
  id: upload-report
  entrypoint: bash
  args:
    - -c
    - |
      gsutil cp semgrep-results.json gs://semgrep-security-scan-reports/$BUILD_ID-semgrep.json


# Step 3 — Count Vulnerabilities
- name: ubuntu
  id: check-vulnerabilities
  entrypoint: bash
  args:
    - -c
    - |
      apt update && apt install -y jq

      HIGH_COUNT=$$(jq '[.results[]? | select(.extra.severity == "ERROR")] | length' semgrep-results.json)

      echo "High severity findings: $$HIGH_COUNT"

      echo $$HIGH_COUNT > vuln-count.txt


# Step 4 — Send Slack Alert
- name: curlimages/curl
  id: slack-alert
  entrypoint: sh
  secretEnv:
    - SLACK_WEBHOOK_URL
  args:
    - -c
    - |
      HIGH_COUNT=$$(cat vuln-count.txt)

      MESSAGE="Semgrep Scan Result | Repo: $REPO_NAME | Commit: $COMMIT_SHA | High Issues: $$HIGH_COUNT | Report: gs://semgrep-security-scan-reports/$BUILD_ID-semgrep.json"

      curl -X POST -H "Content-type: application/json" \
      --data "{\"text\":\"$$MESSAGE\"}" \
      $$SLACK_WEBHOOK_URL


# Step 5 — Block Build If Needed
- name: ubuntu
  id: block-build
  entrypoint: bash
  args:
    - -c
    - |
      HIGH_COUNT=$$(cat vuln-count.txt)

      if [ "$$HIGH_COUNT" -gt 0 ]; then
        echo "Blocking build due to vulnerabilities"
        exit 1
      fi


# Step 6 — Build Docker Image
- name: gcr.io/cloud-builders/docker
  args:
    - build
    - "-t"
    - "us-central1-docker.pkg.dev/gabeo-poc/security-pipeline-poc/app"
    - "."


images:
- "us-central1-docker.pkg.dev/gabeo-poc/security-pipeline-poc/app"

options:
  logging: CLOUD_LOGGING_ONLY